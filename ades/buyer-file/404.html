<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="author" content="Gramentheme">
    <meta name="description" content="ADES - Engineering Excellence">
    <title>404 - Page Not Found | ADES</title>
    <link rel="shortcut icon" href="assets/img/favicon.svg">
    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/all.min.css">
    
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/style-6.css">
    <style>
        .error-area {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: #111;
            color: white;
            padding: 20px;
        }

        .error-content h1 {
            font-size: 120px;
            font-weight: 900;
            background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.2) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        .error-content p {
            font-size: 18px;
            opacity: 0.7;
            margin-bottom: 40px;
        }

        .btn-premium {
            background: white;
            color: black;
            padding: 14px 32px;
            border-radius: 999px;
            text-decoration: none;
            font-weight: 700;
            transition: transform 0.2s;
            display: inline-block;
        }

        .btn-premium:hover {
            transform: scale(1.05);
            color: black;
        }
    </style>
</head>

<body>
    <div class="error-area">
        <div class="container">
            <div class="error-content">
                <h1>404</h1>
                <h2 class="mb-4">Engineering Mistake?</h2>
                <p>The page you are looking for has been decommissioned or moved.<br>Let's get you back on track.</p>
                <a href="index.html" class="btn-premium">Back to Home</a>
            </div>
        </div>
    </div>
</body>

</html>
